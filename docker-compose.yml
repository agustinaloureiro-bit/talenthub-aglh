services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-talenthub}
      POSTGRES_USER: ${POSTGRES_USER:-talenthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-talenthub_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talenthub} -d ${POSTGRES_DB:-talenthub}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://talenthub:talenthub_password@db:5432/talenthub}
      JWT_SECRET: ${JWT_SECRET:-change-me-before-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@aglh.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador AGLH}
      API_PORT: 4000
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres_data:
