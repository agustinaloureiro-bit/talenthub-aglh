services:
  - type: web
    name: talenthub-aglh
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: ADMIN_EMAIL
        value: admin@aglh.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Administrador AGLH
      - key: CORS_ORIGIN
        value: https://talenthub-aglh.onrender.com
      - key: SERVE_STATIC
        value: "true"
